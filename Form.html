<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Example</title>
</head>
<body>
    <h3>Registration Form</h3>
    <form action="/action">
        <div>
            <input type="text" placeholder="First Name" name="fname"/>
            <input type="text" placeholder="Last Name" name="lname"/>
        </div>
        <div>
            <label for="gender">Please Select Gender</label>
            <select name="gender" id="gender">
                <option value="m">Male</option>
                <option value="f">Female</option>
                <option value="o">Other</option>
            </select>
        </div>
        <div>
            Do you agree to all terms of services?
            <input type="checkbox" id="tos_agree" name="tos_agree"/>
            <label for="tos_agree">Yes, I agree</label>
        </div>
        <div>
            <label for="vol">Set volume</label>
            <input type="range" name="vol" id="vol" min="0" max="100" step="2"/>
        </div>
        <button>Register</button>
    </form>
</body>
</html>
